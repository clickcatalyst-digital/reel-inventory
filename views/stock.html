<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stock View | LS Technology</title>
  <link rel="stylesheet" href="/public/css/style.css">
</head>
<body>
  <nav class="nav">
    <a href="/stock" class="nav-brand">LS TECHNOLOGY — STOCK VIEW</a>
    <div class="nav-links">
      <button class="theme-toggle" onclick="toggleTheme()" title="Toggle dark mode">
        <svg id="themeIcon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z"/>
        </svg>
      </button>
      <!-- <a href="/api/logout" style="color:#dc2626;">Logout</a> -->
    </div>
  </nav>

  <div class="container">
    <div class="page-header">
      <h1>Current Stock</h1>
      <p id="lastUpdated">Loading...</p>
    </div>

    <!-- Summary Stats -->
    <div class="card">
      <div class="stats-grid">
        <div class="stat-box">
          <div class="stat-value" id="statItems">—</div>
          <div class="stat-label">Items</div>
        </div>
        <div class="stat-box">
          <div class="stat-value" id="statReels">—</div>
          <div class="stat-label">Reels In Stock</div>
        </div>
        <div class="stat-box">
          <div class="stat-value" id="statQty">—</div>
          <div class="stat-label">Total Quantity</div>
        </div>
      </div>
    </div>

    <!-- Current Stock Table -->
    <div class="card">
      <div class="card-title">Stock by Item</div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Item Code</th>
              <th>Description</th>
              <th>Reels In Stock</th>
              <th>Total Quantity</th>
            </tr>
          </thead>
          <tbody id="stockTable">
            <tr><td colspan="4" style="text-align:center; color:var(--text-muted);">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="/public/js/app.js"></script>
  <script>
    async function loadStock() {
      try {
        const summary = await api('/api/dashboard/stock-summary');
        const inStock = summary
          .filter(s => (s.in_stock_reels || 0) > 0)
          .sort((a, b) => a.item_code.localeCompare(b.item_code));

        // Stats
        document.getElementById('statItems').textContent = inStock.length;
        document.getElementById('statReels').textContent = inStock.reduce((s, i) => s + (i.in_stock_reels || 0), 0).toLocaleString('en-IN');
        document.getElementById('statQty').textContent = formatQty(inStock.reduce((s, i) => s + (i.total_quantity || 0), 0));
        document.getElementById('lastUpdated').textContent = `As of ${new Date().toLocaleString('en-IN', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' })}`;

        // Table
        const tbody = document.getElementById('stockTable');
        if (!inStock.length) {
          tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; color:var(--text-muted);">No stock currently</td></tr>';
        } else {
          tbody.innerHTML = inStock
            .map(s => `
              <tr>
                <td><strong>${s.item_code}</strong></td>
                <td>${s.description || '—'}</td>
                <td>${s.in_stock_reels || 0}</td>
                <td>${formatQty(s.total_quantity || 0)}</td>
              </tr>
            `).join('');
        }

      } catch (e) {}
    }

    loadStock();
  </script>
</body>
</html>
