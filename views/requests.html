<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Requests | Reel Inventory</title>
  <link rel="stylesheet" href="/public/css/style.css">
  <style>
    .request-card {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 12px;
      background: var(--surface);
    }
    .request-card.pending { border-left: 3px solid var(--warning); }
    .request-card.approved { border-left: 3px solid var(--success); }
    .request-card.rejected { border-left: 3px solid var(--danger); }
    .request-meta {
      display: flex; gap: 12px; flex-wrap: wrap;
      font-size: 12px; color: var(--text-muted); margin-bottom: 10px;
    }
    .request-payload {
      font-size: 12px; background: var(--bg);
      border: 1px solid var(--border); border-radius: 4px;
      padding: 8px 12px; margin-bottom: 10px; color: var(--text);
    }
    .request-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .edit-fields { display: none; margin-top: 10px; }
    .edit-fields.open { display: block; }
    .tab-bar {
      display: flex; gap: 4px; margin-bottom: 16px;
      border-bottom: 2px solid var(--border); padding-bottom: 0;
    }
    .tab-btn {
      padding: 8px 18px; border: none; background: none;
      font-family: var(--font); font-size: 13px; font-weight: 600;
      color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent;
      margin-bottom: -2px; transition: color 0.15s;
    }
    .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }
  </style>
</head>
<body>
  <nav class="nav">
    <a href="/" class="nav-brand">LS TECHNOLOGY INVENTORY MGT</a>
    <div class="nav-links">
      <button class="theme-toggle" onclick="toggleTheme()" title="Toggle dark mode">
        <svg id="themeIcon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5">

        </svg>
      </button>
      <a href="/">Catalog</a>
      <a href="/inward">Inward</a>
      <a href="/outward">Outward</a>
      <a href="/dashboard">Dashboard</a>
      <!-- <a href="/api/logout" style="color:#dc2626;">Logout</a> -->

  <div class="container">
    <div class="page-header">
      <h1>Approval Requests</h1>
      <p>Review, approve, or reject pending inward and outward requests</p>
    </div>

    <div class="card">
      <div class="tab-bar">
        <button class="tab-btn active" onclick="switchTab('pending', this)">
          Pending <span id="pendingCount" class="cart-count" style="margin-left:6px;">0</span>
        </button>
        <button class="tab-btn" onclick="switchTab('approved', this)">Approved</button>
        <button class="tab-btn" onclick="switchTab('rejected', this)">Rejected</button>
      </div>
      <div id="requestsList">
        <div style="text-align:center; color:var(--text-muted); padding:32px;">Loading...</div>
      </div>
    </div>
  </div>

  <script src="/public/js/app.js"></script>
  <script>
    let currentTab = 'pending';

    function switchTab(status, btn) {
      currentTab = status;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      loadRequests(status);
    }

    async function loadRequests(status = 'pending') {
      const list = document.getElementById('requestsList');
      list.innerHTML = '<div style="text-align:center; color:var(--text-muted); padding:32px;">Loading...</div>';
      try {
        const requests = await api(`/api/requests?status=${status}`);

        // Update pending count badge
        if (status === 'pending') {
          document.getElementById('pendingCount').textContent = requests.length;
          document.getElementById('pendingCount').style.display = requests.length ? 'inline-block' : 'none';
        }

        if (!requests.length) {
          list.innerHTML = `<div style="text-align:center; color:var(--text-muted); padding:32px;">No ${status} requests</div>`;
          return;
        }

        list.innerHTML = requests.map(r => renderRequest(r, status)).join('');
      } catch (e) {
        list.innerHTML = '<div style="text-align:center; color:var(--danger); padding:32px;">Failed to load requests</div>';
      }
    }

    function renderRequest(r, status) {
      const p = r.payload;
      const isPending = status === 'pending';
      const typeLabel = r.type === 'inward' ? '📥 Inward' : '📤 Outward';
      const statusClass = status;

      let payloadHtml = '';
      if (r.type === 'inward') {
        payloadHtml = `
          <div class="request-payload">
            <strong>Item:</strong> ${p.item_code} &nbsp;|&nbsp;
            <strong>Reels:</strong> ${p.num_reels} &nbsp;|&nbsp;
            <strong>Boxes:</strong> ${p.num_boxes || 0} &nbsp;|&nbsp;
            <strong>Notes:</strong> ${p.notes || '—'}
          </div>`;
      } else {
        const reels = p.reel_numbers || (p.reel_number ? [p.reel_number] : []);
        payloadHtml = `
          <div class="request-payload">
            <strong>Item:</strong> ${p.item_code || '—'} &nbsp;|&nbsp;
            <strong>Customer:</strong> ${p.customer_name} &nbsp;|&nbsp;
            <strong>Invoice:</strong> ${p.invoice_number} &nbsp;|&nbsp;
            <strong>Reels (${reels.length}):</strong> ${reels.map(r => r.replace('REEL-', '')).join(', ')} &nbsp;|&nbsp;
            <strong>Notes:</strong> ${p.notes || '—'}
          </div>`;
      }

      let editFieldsHtml = '';
      if (isPending && r.type === 'inward') {
        editFieldsHtml = `
          <div class="edit-fields" id="edit-${r.id}">
            <div class="form-row">
              <div class="form-group">
                <label>Item Code</label>
                <input type="text" class="form-control" id="edit-item-${r.id}" value="${p.item_code}">
              </div>
              <div class="form-group">
                <label>Number of Reels</label>
                <input type="number" class="form-control" id="edit-reels-${r.id}" value="${p.num_reels}" min="1">
              </div>
              <div class="form-group">
                <label>Num Boxes</label>
                <input type="number" class="form-control" id="edit-boxes-${r.id}" value="${p.num_boxes || 0}" min="0">
              </div>
            </div>
            <div class="form-group">
              <label>Notes</label>
              <input type="text" class="form-control" id="edit-notes-${r.id}" value="${p.notes || ''}">
            </div>
            <div class="btn-row" style="margin-top:8px;">
              <button class="btn btn-success btn-sm" onclick="editApprove(${r.id}, 'inward')">Approve Edited</button>
              <button class="btn btn-ghost btn-sm" onclick="toggleEdit(${r.id})">Cancel</button>
            </div>
          </div>`;
      } else if (isPending && r.type === 'outward') {
        const reels = p.reel_numbers || (p.reel_number ? [p.reel_number] : []);
        editFieldsHtml = `
          <div class="edit-fields" id="edit-${r.id}">
            <div class="form-row">
              <div class="form-group">
                <label>Customer</label>
                <input type="text" class="form-control" id="edit-customer-${r.id}" value="${p.customer_name}">
              </div>
              <div class="form-group">
                <label>Invoice</label>
                <input type="text" class="form-control" id="edit-invoice-${r.id}" value="${p.invoice_number}">
              </div>
            </div>
            <div class="form-group">
              <label>Reels — uncheck to remove from this approval</label>
              <div style="display:flex; flex-wrap:wrap; gap:8px; margin-top:6px;">
                ${reels.map(rn => `
                  <label style="display:flex; align-items:center; gap:5px; font-size:12px; font-weight:400; cursor:pointer;">
                    <input type="checkbox" class="edit-reel-check-${r.id}" value="${rn}" checked
                      style="accent-color:var(--primary);">
                    ${rn.replace('REEL-', '')}
                  </label>
                `).join('')}
              </div>
            </div>
            <div class="form-group">
              <label>Notes</label>
              <input type="text" class="form-control" id="edit-notes-${r.id}" value="${p.notes || ''}">
            </div>
            <div class="btn-row" style="margin-top:8px;">
              <button class="btn btn-success btn-sm" onclick="editApprove(${r.id}, 'outward')">Approve Selected</button>
              <button class="btn btn-ghost btn-sm" onclick="toggleEdit(${r.id})">Cancel</button>
            </div>
          </div>`;
      }

      const reviewedInfo = !isPending
        ? `<span>Reviewed by <strong>${r.reviewed_by}</strong> · ${formatDateTime(r.reviewed_at)}</span>`
        : '';
      const rejectReason = r.reject_reason
        ? `<div style="font-size:12px; color:var(--danger); margin-top:6px;">Reason: ${r.reject_reason}</div>`
        : '';

      return `
        <div class="request-card ${statusClass}" id="reqcard-${r.id}">
          <div class="request-meta">
            <span><strong>#${r.id}</strong></span>
            <span>${typeLabel}</span>
            <span>By <strong>${r.created_by}</strong></span>
            <span>${formatDateTime(r.created_at)}</span>
            ${reviewedInfo}
          </div>
          ${payloadHtml}
          ${rejectReason}
          ${editFieldsHtml}
          ${isPending ? `
            <div class="request-actions">
              <button class="btn btn-success btn-sm" onclick="approve(${r.id})">✓ Approve</button>
              <button class="btn btn-ghost btn-sm" onclick="toggleEdit(${r.id})">✏️ Edit & Approve</button>
              <button class="btn btn-danger btn-sm" onclick="reject(${r.id})">✕ Reject</button>
            </div>` : ''}
        </div>`;
    }

    function toggleEdit(id) {
      const el = document.getElementById(`edit-${id}`);
      el.classList.toggle('open');
    }

    async function approve(id) {
      try {
        await api(`/api/requests/${id}/approve`, { method: 'POST' });
        showToast(`Request #${id} approved`);
        loadRequests(currentTab);
      } catch (e) {}
    }

    async function reject(id) {
      const reason = prompt('Reject reason (optional):');
      if (reason === null) return; // cancelled
      try {
        await api(`/api/requests/${id}/reject`, {
          method: 'POST',
          body: { reject_reason: reason }
        });
        showToast(`Request #${id} rejected`);
        loadRequests(currentTab);
      } catch (e) {}
    }

    async function editApprove(id, type) {
      let payload = {};
      if (type === 'inward') {
        payload = {
          item_code: document.getElementById(`edit-item-${id}`).value.trim().toUpperCase(),
          num_reels: parseInt(document.getElementById(`edit-reels-${id}`).value),
          num_boxes: parseInt(document.getElementById(`edit-boxes-${id}`).value) || 0,
          notes: document.getElementById(`edit-notes-${id}`).value.trim() || null
        };
        if (!payload.item_code || !payload.num_reels) {
          return showToast('Item code and reels are required', 'error');
        }
      } else {
        const checked = [...document.querySelectorAll(`.edit-reel-check-${id}:checked`)];
        const reelNumbers = checked.map(cb => cb.value.startsWith('REEL-') ? cb.value : `REEL-${cb.value}`);
        if (!reelNumbers.length) {
          return showToast('Select at least one reel to approve', 'error');
        }
        payload = {
          item_code: checked[0]?.closest('[data-item]')?.dataset.item || undefined,
          customer_name: document.getElementById(`edit-customer-${id}`).value.trim(),
          invoice_number: document.getElementById(`edit-invoice-${id}`).value.trim(),
          reel_numbers: reelNumbers,
          outward_type: 'Full',
          notes: document.getElementById(`edit-notes-${id}`).value.trim() || null
        };
        if (!payload.customer_name || !payload.invoice_number) {
          return showToast('Customer and invoice are required', 'error');
        }
      }

      try {
        await api(`/api/requests/${id}/edit-approve`, {
          method: 'POST',
          body: { payload }
        });
        showToast(`Request #${id} edited and approved`);
        loadRequests(currentTab);
      } catch (e) {}
    }

    loadRequests('pending');
  </script>
