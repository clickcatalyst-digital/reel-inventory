</head>

        </svg>
      </button>
      <a href="/">Catalog</a>
      <a href="/inward">Inward</a>
      <a href="/outward">Outward</a>
      <a href="/dashboard">Dashboard</a>
      <a href="/api/logout" style="color:#dc2626;">Logout</a>
    </div>
    <!-- Mobile cog menu -->
    <div class="cog-menu" id="cogMenu">
      <button class="cog-btn" onclick="toggleCogMenu()" title="Settings">
        <svg viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
        </svg>
      </button>
      <div class="cog-dropdown" id="cogDropdown">
        <button onclick="toggleTheme(); toggleCogMenu()">
          <svg viewBox="0 0 24 24" id="cogThemeIcon">
            <circle cx="12" cy="12" r="5"/>
            <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
          </svg>
          <span id="cogThemeLabel">Dark Mode</span>
        </button>
        <a href="/api/logout" class="logout-link">
          <svg viewBox="0 0 24 24">
            <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/>
          </svg>
          Logout
        </a>
      </div>
    </div>
  </nav>

  <div class="container">
    <div class="page-header">
      <h1>Inward Stock</h1>
      <p>Receive new reels, assign to boxes, and generate QR labels</p>
    </div>

    <div class="card">
      <div class="card-title">Receive Reels</div>
      <form id="inwardForm">
        <div class="form-row-3">
          <div class="form-group">
            <label>Item Code</label>
            <select id="itemSelect" class="form-control" required>
              <option value="">— Select Item —</option>
            </select>
          </div>
          <div class="form-group">
            <label>Number of Reels</label>
            <input type="number" id="numReels" class="form-control" placeholder="e.g. 50" min="1" max="500" required>
          </div>
          <div class="form-group">
            <label>Reels Per Box</label>
            <input type="number" id="reelsPerBox" class="form-control" placeholder="0 = no box" min="0" max="500" value="0">
          </div>
        </div>

        <div class="form-group">
          <label>Notes (optional)</label>
          <input type="text" id="inwardNotes" class="form-control" placeholder="e.g. Supplier batch #, PO number">
        </div>
        <div id="itemInfo" style="display:none; margin-bottom:14px;">
          <div class="reel-info">
            <div class="reel-meta" style="grid-template-columns:1fr 1fr 1fr 1fr;">
              <div><dt>Description</dt><dd id="infoDesc">—</dd></div>
              <div><dt>Default SPQ</dt><dd id="infoSpq">—</dd></div>
              <div><dt>Total Reels</dt><dd id="infoCount">—</dd></div>
              <div><dt>Boxes</dt><dd id="infoBoxes">—</dd></div>
            </div>
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Inward Reels</button>
      </form>
    </div>

    <!-- Result -->
    <div id="resultCard" class="card" style="display:none;">
      <div class="card-title" id="resultTitle">Reels Created</div>
      <div id="resultContent"></div>
      <div class="btn-row" style="margin-top:16px; flex-wrap:wrap;">
        <button class="btn btn-primary" onclick="printReelLabels()">Download Reel Labels</button>
        <button class="btn btn-ghost" id="boxLabelBtn" onclick="printBoxLabels()">Download Box Labels</button>
        <button class="btn btn-ghost" onclick="resetForm()">Inward More</button>
      </div>
    </div>

    <!-- Recent Inwards -->
    <div class="card">
      <div id="recentTable-container"></div>
      <div style="margin-top:12px;">
        <button class="btn btn-ghost btn-sm" onclick="reprintSelected()">Reprint Selected Labels</button>
      </div>
    </div>
  </div>

  <script src="/public/js/app.js"></script>
  <script>
    let lastResult = null;
    let itemsCache = [];

    async function loadItemDropdown() {
      try {
        itemsCache = await api('/api/items');
        const select = document.getElementById('itemSelect');
        select.innerHTML = '<option value="">— Select Item —</option>' +
          itemsCache.sort((a, b) => a.item_code.localeCompare(b.item_code)).map(i => `<option value="${i.item_code}">${i.item_code} — ${i.description}</option>`).join('');
      } catch (e) {}
    }

    document.getElementById('itemSelect').addEventListener('change', updateInfo);
    document.getElementById('numReels').addEventListener('input', updateInfo);
    document.getElementById('reelsPerBox').addEventListener('input', updateInfo);

    function updateInfo() {
      const code = document.getElementById('itemSelect').value;
      const numReels = parseInt(document.getElementById('numReels').value) || 0;
      const perBox = parseInt(document.getElementById('reelsPerBox').value) || 0;
      const info = document.getElementById('itemInfo');
      const item = itemsCache.find(i => i.item_code === code);

      if (item) {
        info.style.display = 'block';
        document.getElementById('infoDesc').textContent = item.description;
        document.getElementById('infoSpq').textContent = formatQty(item.default_spq) + ' per reel';
        document.getElementById('infoCount').textContent = numReels ? `${numReels} reel(s)` : '—';

        if (perBox === 0) {
          document.getElementById('infoBoxes').textContent = 'No boxes';
        } else if (numReels > 0 && numReels % perBox !== 0) {
          document.getElementById('infoBoxes').textContent = `⚠️ ${numReels} not divisible by ${perBox}`;
        } else if (numReels > 0) {
          document.getElementById('infoBoxes').textContent = `${numReels / perBox} box(es), ${perBox} per box`;
        } else {
          document.getElementById('infoBoxes').textContent = '—';
        }
      } else {
        info.style.display = 'none';
      }
    }

    document.getElementById('inwardForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const numReels = parseInt(document.getElementById('numReels').value);
      const perBox = parseInt(document.getElementById('reelsPerBox').value) || 0;

      if (perBox > 0 && numReels % perBox !== 0) {
        return showToast(`${numReels} reels is not evenly divisible by ${perBox} per box`, 'error');
      }

      const numBoxes = perBox > 0 ? numReels / perBox : 0;

      try {
        const data = await api('/api/inward', {
          method: 'POST',
          body: {
            item_code: document.getElementById('itemSelect').value,
            num_reels: numReels,
            num_boxes: numBoxes,
            notes: document.getElementById('inwardNotes').value
          }
        });
        lastResult = data;
        showToast(data.message);

        // Show grouped result
        let html = '';
        if (data.boxes.length > 0) {
          for (const box of data.boxes) {
            html += `<div style="margin-bottom:12px;">
              <strong>${box.box_number}</strong> — ${box.reel_count} reel(s)
              <div style="font-size:12px; color:var(--text-muted); margin-top:4px;">
                ${box.reels.map(r => r.reel_number).join(', ')}
              </div>
            </div>`;
          }
        } else {
          html = `<div style="font-size:12px; color:var(--text-muted);">
            ${data.reels.map(r => r.reel_number).join(', ')}
          </div>`;
        }
        document.getElementById('resultContent').innerHTML = html;
        document.getElementById('resultCard').style.display = 'block';
        document.getElementById('resultTitle').textContent = data.boxes.length > 0 ? 'Reels & Boxes Created' : 'Reels Created';
        document.getElementById('boxLabelBtn').style.display = data.boxes.length > 0 ? 'inline-flex' : 'none';
        loadRecent();
      } catch (e) {}
    });

    async function printReelLabels() {
      if (!lastResult) return;
      const reelNumbers = lastResult.reels.map(r => r.reel_number);
      await downloadPDF('/api/labels/generate', { reel_numbers: reelNumbers }, 'reel_labels');
    }

    async function printBoxLabels() {
      if (!lastResult) return;
      const boxNumbers = lastResult.boxes.map(b => b.box_number);
      await downloadPDF('/api/labels/generate-box', { box_numbers: boxNumbers }, 'box_labels');
    }

    async function downloadPDF(url, body, prefix) {
      try {
        const res = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        const blob = await res.blob();
        const link = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = link;
        a.download = `${prefix}_${Date.now()}.pdf`;
        a.click();
        URL.revokeObjectURL(link);
        showToast('PDF downloaded');
      } catch (e) {
        showToast('Failed to generate PDF', 'error');
      }
    }

    function resetForm() {
      document.getElementById('inwardForm').reset();
      document.getElementById('resultCard').style.display = 'none';
      document.getElementById('itemInfo').style.display = 'none';
      lastResult = null;
    }

    const recentTablePT = new PaginatedTable({
      containerId: 'recentTable-container',
      pageSize: 10,
      titleText: 'Recent Inwards',
      columns: [
        { label: '<input type="checkbox" id="selectAll" onchange="toggleSelectAll(this)">', render: r => `<input type="checkbox" class="reel-check" value="${r.reel_number}">` },
        { label: 'Reel', render: r => `<strong>${r.reel_number}</strong>` },
        { label: 'Box', render: r => r.box_number || '—' },
        { label: 'Item', render: r => r.item_code },
        { label: 'Qty', render: r => formatQty(r.quantity) },
        { label: 'Status', render: r => statusBadge(r.status) },
        { label: 'Date & Time', render: r => formatDateTime(r.inward_date) },
      ]
    });

    async function loadRecent() {
      try {
        const reels = await api(`/api/inward/recent?limit=500`);
        recentTablePT.load(reels);
      } catch (e) {}
    }

    function toggleSelectAll(el) {
      document.querySelectorAll('.reel-check').forEach(cb => cb.checked = el.checked);
    }

    async function reprintSelected() {
      const selected = [...document.querySelectorAll('.reel-check:checked')].map(cb => cb.value);
      if (!selected.length) return showToast('Select at least one reel', 'error');
      await downloadPDF('/api/labels/generate', { reel_numbers: selected }, 'labels_reprint');
    }

    loadItemDropdown();
    loadRecent();
  </script>
