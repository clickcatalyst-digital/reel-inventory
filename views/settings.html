  <div class="container">
    <div class="page-header">
      <h1>Settings</h1>
      <p>Manage users and access levels</p>
    </div>

    <!-- Add User -->
    <div class="card">
      <div class="card-title">Add User</div>
      <div class="form-row-3">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="newUsername" class="form-control" placeholder="e.g. ravi">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="newPassword" class="form-control" placeholder="Set a password">
        </div>
        <div class="form-group">
          <label>Role</label>
          <select id="newRole" class="form-control">
            <option value="user">User (staff)</option>
            <option value="client">Client (read-only)</option>
            <option value="manager">Manager</option>
            <option value="admin">Admin</option>
          </select>
        </div>
      </div>
      <button class="btn btn-primary" onclick="addUser()">Add User</button>
    </div>

    <!-- User List -->
    <div class="card">
      <div class="card-title">All Users</div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Username</th>
              <th>Role</th>
              <th>Created</th>
              <th>New Password</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="usersTable">
            <tr><td colspan="5" style="text-align:center; color:var(--text-muted);">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="/public/js/app.js"></script>
  <script>
    async function loadUsers() {
      try {
        const users = await api('/api/settings/users');
        const tbody = document.getElementById('usersTable');
        if (!users.length) {
          tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; color:var(--text-muted);">No users found</td></tr>';
          return;
        }
        tbody.innerHTML = users.map(u => `
          <tr>
            <td><strong>${u.username}</strong></td>
            <td>
              <select class="form-control" id="role-${u.id}" style="padding:4px 8px; font-size:12px;">
                <option value="user"     ${u.role === 'user'     ? 'selected' : ''}>User</option>
                <option value="client"   ${u.role === 'client'   ? 'selected' : ''}>Client</option>
                <option value="manager"  ${u.role === 'manager'  ? 'selected' : ''}>Manager</option>
                <option value="admin"    ${u.role === 'admin'    ? 'selected' : ''}>Admin</option>
              </select>
            </td>
            <td>${formatDate(u.created_at)}</td>
            <td>
              <input type="password" class="form-control" id="pw-${u.id}"
                placeholder="Leave blank to keep"
                style="padding:4px 8px; font-size:12px; width:160px;">
            </td>
            <td>
              <div style="display:flex; gap:6px;">
                <button class="btn btn-ghost btn-sm" onclick="updateUser(${u.id}, '${u.username}')">Save</button>
                <button class="btn btn-danger btn-sm" onclick="deleteUser(${u.id}, '${u.username}')">Delete</button>
              </div>
            </td>
          </tr>
        `).join('');
      } catch (e) {}
    }

    async function addUser() {
      const username = document.getElementById('newUsername').value.trim();
      const password = document.getElementById('newPassword').value;
      const role = document.getElementById('newRole').value;

      if (!username || !password) return showToast('Username and password required', 'error');

      try {
        await api('/api/settings/users', {
          method: 'POST',
          body: { username, password, role }
        });
        showToast(`User "${username}" added`);
        document.getElementById('newUsername').value = '';
        document.getElementById('newPassword').value = '';
        loadUsers();
      } catch (e) {}
    }

    async function updateUser(id, username) {
      const role = document.getElementById(`role-${id}`).value;
      const password = document.getElementById(`pw-${id}`).value;

      try {
        await api(`/api/settings/users/${id}`, {
          method: 'PUT',
          body: { role, password: password || undefined }
        });
        showToast(`User "${username}" updated`);
        loadUsers();
      } catch (e) {}
    }

    async function deleteUser(id, username) {
      if (!confirm(`Delete user "${username}"? This cannot be undone.`)) return;
      try {
        await api(`/api/settings/users/${id}`, { method: 'DELETE' });
        showToast(`User "${username}" deleted`);
        loadUsers();
      } catch (e) {}
    }

    loadUsers();
  </script>
